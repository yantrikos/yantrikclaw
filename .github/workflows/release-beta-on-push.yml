name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: yantrikclaw
            ext: tar.gz
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: yantrikclaw
            ext: tar.gz
            cross_compiler: gcc-aarch64-linux-gnu
            linker: aarch64-linux-gnu-gcc
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: yantrikclaw
            ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: yantrikclaw.exe
            ext: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release-${{ matrix.target }}

      - name: Install cross compiler
        if: matrix.cross_compiler
        run: sudo apt-get update -qq && sudo apt-get install -y ${{ matrix.cross_compiler }}

      - name: Ensure web/dist placeholder exists
        shell: bash
        run: mkdir -p web/dist && touch web/dist/.gitkeep

      - name: Build release
        shell: bash
        run: |
          if [ -n "${{ matrix.linker || '' }}" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER="${{ matrix.linker }}"
          fi
          cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../yantrikclaw-${{ matrix.target }}.${{ matrix.ext }} ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../yantrikclaw-${{ matrix.target }}.${{ matrix.ext }} ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: yantrikclaw-${{ matrix.target }}
          path: yantrikclaw-${{ matrix.target }}.${{ matrix.ext }}
          retention-days: 7

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: yantrikclaw-*
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec sha256sum {} + | sed 's|  \./[^/]*/|  |' > SHA256SUMS
          cat SHA256SUMS

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name 'SHA256SUMS' \) -exec cp {} release-assets/ \;
          ls -lh release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" release-assets/* \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes
