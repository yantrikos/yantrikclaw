# YantrikClaw Docker Compose Example
# 
# Quick start:
#   1. Copy this file and set your API key
#   2. Run: docker compose up -d
#   3. Access gateway at http://localhost:42617
#
# For more info: https://github.com/yantrikos/yantrikclaw

services:
  yantrikclaw:
    image: ghcr.io/yantrikos/yantrikclaw:latest
    # For ARM64 environments where the distroless image exits immediately,
    # switch to the Debian compatibility image instead:
    # image: ghcr.io/yantrikos/yantrikclaw:debian
    # Or build locally (distroless, no shell):
    # build: .
    # Or build the Debian variant (includes bash, git, curl):
    # build:
    #   context: .
    #   dockerfile: Dockerfile.debian
    container_name: yantrikclaw
    restart: unless-stopped
    
    environment:
      # Required: Your LLM provider API key
      - API_KEY=${API_KEY:-}
      # Or use the prefixed version:
      # - YANTRIKCLAW_API_KEY=${YANTRIKCLAW_API_KEY:-}
      
      # Optional: LLM provider (default: openrouter)
      # Options: openrouter, openai, anthropic, ollama
      - PROVIDER=${PROVIDER:-openrouter}
      
      # Allow public bind inside Docker (required for container networking)
      - YANTRIKCLAW_ALLOW_PUBLIC_BIND=true
      # Default gateway port inside container
      - YANTRIKCLAW_GATEWAY_PORT=${YANTRIKCLAW_GATEWAY_PORT:-42617}
      
      # Optional: Model override
      # - YANTRIKCLAW_MODEL=anthropic/claude-sonnet-4-20250514
      
    volumes:
      # Persist workspace and config (must match WORKDIR/HOME in Dockerfile)
      - yantrikclaw-data:/yantrikclaw-data
      
    ports:
      # Gateway API port (override HOST_PORT if 42617 is taken)
      - "${HOST_PORT:-42617}:${YANTRIKCLAW_GATEWAY_PORT:-42617}"
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 32M

    # Health check — uses lightweight status instead of full diagnostics.
    # For images with curl, prefer: curl -f http://localhost:42617/health
    healthcheck:
      test: ["CMD", "yantrikclaw", "status", "--format=exit-code"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      searxng:
        condition: service_healthy

  # ── SearXNG — self-hosted metasearch engine ──────────────────────
  # Provides web search for the agent without API keys.
  # JSON API: http://searxng:8080/search?q=...&format=json
  searxng:
    image: searxng/searxng:latest
    container_name: yantrikclaw-searxng
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-8888}/
    volumes:
      - searxng-data:/etc/searxng
    ports:
      - "${SEARXNG_PORT:-8888}:8080"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  yantrikclaw-data:
  searxng-data:
